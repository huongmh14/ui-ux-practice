<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Result 03 - Web Analytics Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="03-demo-style.css" />
  </head>
  <body data-theme="hig" data-viewport="web">
    <main class="container-fluid px-4 py-4">
      <section class="content-card p-4">
        <header class="d-flex align-items-center justify-content-between mb-4">
          <h1>Analytics Workspace</h1>
          <button class="btn btn-brand">Export</button>
        </header>

        <div class="row g-4">
          <aside class="col-md-3 content-card p-4">
            <h2 class="h5 mb-3">Filters</h2>
            <label for="range" class="form-label">Date Range</label>
            <select id="range" class="form-select mb-3">
              <option>Last 7 days</option>
              <option>Last 30 days</option>
              <option>Last 90 days</option>
            </select>

            <label for="channel" class="form-label">Channel</label>
            <select id="channel" class="form-select">
              <option>All channels</option>
              <option>Organic</option>
              <option>Paid</option>
            </select>
          </aside>

          <section class="col-md-9">
            <div class="row g-3 mb-3">
              <article class="col-md-4 content-card p-4">
                <h3 class="h6">Visitors</h3>
                <p class="h4 mb-0">42,100</p>
              </article>
              <article class="col-md-4 content-card p-4">
                <h3 class="h6">Conversion Rate</h3>
                <p class="h4 mb-0">3.8%</p>
              </article>
              <article class="col-md-4 content-card p-4">
                <h3 class="h6">Bounce Rate</h3>
                <p class="h4 mb-0">28%</p>
              </article>
            </div>

            <section class="content-card p-4">
              <h2 class="h5 mb-3">Top Pages</h2>
              <table class="table table-sm mb-0">
                <thead>
                  <tr>
                    <th>Page</th>
                    <th>Views</th>
                    <th>Conversion</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>Homepage</td>
                    <td>18,400</td>
                    <td><span class="badge badge-soft">4.2%</span></td>
                  </tr>
                  <tr>
                    <td>Pricing</td>
                    <td>8,120</td>
                    <td><span class="badge badge-soft">6.1%</span></td>
                  </tr>
                  <tr>
                    <td>Blog</td>
                    <td>5,900</td>
                    <td><span class="badge badge-soft">1.9%</span></td>
                  </tr>
                </tbody>
              </table>
            </section>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
