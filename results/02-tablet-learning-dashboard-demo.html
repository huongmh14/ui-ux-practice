<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Result 02 - Tablet Learning Dashboard Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="02-demo-style.css" />
  </head>
  <body data-theme="hig" data-viewport="web">
    <main class="container-fluid px-4 py-4">
      <section class="content-card p-4">
        <header class="d-flex align-items-center justify-content-between mb-4">
          <h1>Learning Dashboard</h1>
          <button class="btn btn-outline-brand btn-sm" type="button">Notifications</button>
        </header>

        <section class="content-card p-3 mb-3 d-flex align-items-center justify-content-between">
          <div>
            <h2 class="h5">Progress Overview</h2>
            <p class="small mb-0">2 courses active, 1 due this week.</p>
          </div>
          <span class="badge badge-soft">Due Soon</span>
        </section>

        <div class="row g-3">
          <section class="col-md-7 content-card p-4">
            <h2 class="h5 mb-3">Continue Learning</h2>
            <article class="d-flex align-items-center justify-content-between mb-2">
              <div>
                <h3 class="h6">UX Writing Basics</h3>
                <p class="small mb-0">Lesson 5 of 12</p>
              </div>
              <button class="btn btn-brand btn-sm">Resume</button>
            </article>
            <article class="d-flex align-items-center justify-content-between">
              <div>
                <h3 class="h6">Design Systems</h3>
                <p class="small mb-0">Lesson 3 of 8</p>
              </div>
              <button class="btn btn-brand btn-sm">Resume</button>
            </article>
          </section>

          <section class="col-md-5 content-card p-4">
            <h2 class="h5 mb-3">Upcoming Tasks</h2>
            <ul class="insight-list">
              <li>Quiz: Accessibility Basics</li>
              <li>Project: Travel App Wireframe</li>
              <li>Peer Review: Checkout Flow</li>
            </ul>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
