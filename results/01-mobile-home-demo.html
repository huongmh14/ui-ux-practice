<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Result 01 - Mobile Home Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="01-demo-style.css" />
  </head>
  <body data-theme="hig" data-viewport="web">
    <main class="container-fluid px-4 py-4">
      <section class="content-card p-4">
        <header class="d-flex align-items-center justify-content-between mb-4">
          <h1>City Explorer</h1>
          <button class="btn btn-outline-brand btn-sm" type="button">Search</button>
        </header>

        <section class="content-card p-3 mb-3">
          <span class="badge badge-soft">Weekend Pick</span>
          <h2 class="h5 mt-2">Welcome Back</h2>
          <p class="mb-0">Plan your next weekend in one tap.</p>
        </section>

        <section class="row g-3">
          <article class="col-12 content-card p-3 d-flex align-items-center justify-content-between">
            <div>
              <h3 style="font-size: 1rem">Old Town Market</h3>
              <p>Food and crafts</p>
            </div>
            <button class="btn" type="button">View</button>
          </article>
          <article class="panel section-space h-stack">
            <div>
              <h3 style="font-size: 1rem">River Walk</h3>
              <p>Morning trail</p>
            </div>
            <button class="btn" type="button">View</button>
          </article>
          <article class="panel section-space h-stack">
            <div>
              <h3 style="font-size: 1rem">Art Street</h3>
              <p>Weekend events</p>
            </div>
            <button class="btn" type="button">View</button>
          </article>
        </section>

        <nav class="panel section-space h-stack" aria-label="Bottom navigation">
          <strong>Home</strong>
          <span>Map</span>
          <span>Saved</span>
          <span>Profile</span>
        </nav>
      </section>
    </main>
  </body>
</html>
